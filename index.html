<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiara</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-inner container">
        <button
          class="header-burger"
          type="button"
          aria-label="Открыть меню"
          aria-expanded="false"
          aria-controls="mobile-menu"
        >
          <svg
            viewBox="0 0 18 12"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M0 12H18V10H0V12ZM0 7H18V5H0V7ZM0 0V2H18V0H0Z" fill="#0C0C0C" />
          </svg>
        </button>
        <a class="header-inner-logo" href="/">
          <svg
            class="header-inner-logo-svg"
           
            viewBox="0 0 78.3497 18"
            fill="currentColor"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M748 0H438V1204H41V1462H1145V1204H748Z"
              fill="currentColor"
              transform="translate(0 17.7) scale(0.01205722 -0.01205722)"
            />

            <path
              d="M184 0V1462H494V0Z"
              fill="currentColor"
              transform="translate(15.2999 17.7) scale(0.01205722 -0.01205722)"
            />

            <path
              d="M1079 0 973 348H440L334 0H0L516 1468H895L1413 0ZM899 608Q752 1081 733.5 1143Q715 1205 707 1241Q674 1113 518 608Z"
              fill="currentColor"
              transform="translate(24.4747 17.7) scale(0.01205722 -0.01205722)"
            />

            <path
              d="M494 813H594Q741 813 811 862Q881 911 881 1016Q881 1120 809.5 1164Q738 1208 588 1208H494ZM494 561V0H184V1462H610Q908 1462 1051 1353.5Q1194 1245 1194 1024Q1194 895 1123 794.5Q1052 694 922 637Q1252 144 1352 0H1008L659 561Z"
              fill="currentColor"
              transform="translate(42.5115 17.7) scale(0.01205722 -0.01205722)"
            />

            <path
              d="M1079 0 973 348H440L334 0H0L516 1468H895L1413 0ZM899 608Q752 1081 733.5 1143Q715 1205 707 1241Q674 1113 518 608Z"
              fill="currentColor"
              transform="translate(61.3129 17.7) scale(0.01205722 -0.01205722)"
            />
          </svg>
        </a>
        <nav class="header-inner-menu">
          <ul class="header-inner-menu-list">
            <li class="header-inner-menu-item">
              <a class="header-inner-menu-link is-current" href="/">Главная</a>
            </li>
            <li class="header-inner-menu-item">
              <a class="header-inner-menu-link" href="/">О нас</a>
            </li>
            <li class="header-inner-menu-item">
              <a class="header-inner-menu-link" href="/">Предзаказ</a>
            </li>
            <li class="header-inner-menu-item">
              <a class="header-inner-menu-link" href="/">Контакты</a>
            </li>
          </ul>
        </nav>
        <div class="header-actions">
          <button class="night-theme-toggle" type="button">
            <svg
              class="night-theme-toogle-svg"
              viewBox="0 0 48.00 48.00"
              xmlns="http://www.w3.org/2000/svg"
              fill="#000000"
              stroke="#000000"
              stroke-width="0.00048000000000000007"
            >
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g
                id="SVGRepo_tracerCarrier"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke="#CCCCCC"
                stroke-width="1.056"
              ></g>
              <g id="SVGRepo_iconCarrier">
                <title>dark-mode</title>
                <g id="Layer_2" data-name="Layer 2">
                  <g id="Icons">
                    <g>
                      <rect width="48" height="48" fill="none"></rect>
                      <g>
                        <path d="M14,24A10,10,0,0,0,24,34V14A10,10,0,0,0,14,24Z"></path>
                        <path
                          d="M24,2A22,22,0,1,0,46,24,21.9,21.9,0,0,0,24,2ZM6,24A18.1,18.1,0,0,1,24,6v8a10,10,0,0,1,0,20v8A18.1,18.1,0,0,1,6,24Z"
                        ></path>
                      </g>
                    </g>
                  </g>
                </g>
              </g>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <script src="scripts.js"></script>
  </body>
</html>
